apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
data:
  dashboard.json: |
    {
      "title": "Nginx Monitoring",
      "panels": [
        {
          "type": "graph",
          "title": "Request Rate",
          "targets": [
            {
              "expr": "up",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 16,
      "version": 1
    }