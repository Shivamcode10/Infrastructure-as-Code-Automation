apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: metrics-server
  template:
    metadata:
      labels:
        k8s-app: metrics-server
    spec:
      containers:
      - name: metrics-server
        image: registry.k8s.io/metrics-server/metrics-server:v0.8.1
        args:
          - --cert-dir=/tmp
          - --secure-port=10250
          - --kubelet-insecure-tls
          - --kubelet-preferred-address-types=InternalIP
          - --kubelet-use-node-status-port
          - --metric-resolution=15s
        ports:
          - containerPort: 10250
            name: https
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
        volumeMounts:
          - mountPath: /tmp
            name: tmp-dir
      serviceAccountName: metrics-server
      volumes:
        - name: tmp-dir
          emptyDir: {}